<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="voice - write in your own voice, not the model's">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#161d33"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#2dd4bf" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow)"/>

  <g fill="none" stroke="url(#wave)" stroke-linecap="round">
    <path d="M0,300 C150,255 300,345 450,300 S750,255 900,300 S1150,255 1200,300" stroke-width="3" opacity="0.40"/>
    <path d="M0,316 C150,286 300,346 450,316 S750,286 900,316 S1150,286 1200,316" stroke-width="2" opacity="0.22"/>
    <path d="M0,284 C150,254 300,314 450,284 S750,254 900,284 S1150,254 1200,284" stroke-width="2" opacity="0.16"/>
  </g>

  <text x="600" y="172" text-anchor="middle" font-family="'Segoe UI',Helvetica,system-ui,-apple-system,sans-serif" font-size="148" font-weight="800" letter-spacing="-5" fill="url(#word)">voice</text>

  <text x="600" y="224" text-anchor="middle" font-family="'Segoe UI',Helvetica,system-ui,sans-serif" font-size="27" font-weight="500" fill="#cdd7e6">Write in your own voice. Not the model's.</text>

  <text x="600" y="259" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14.5" letter-spacing="3" fill="#7e8da8">claude code skill &#183; strips AI tells &#183; deterministic gate</text>
</svg>
